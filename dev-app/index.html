<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f3460" />
  <link rel="manifest" href="manifest.json" />
  <title>Stunning Algorithm Workbench</title>
</head>
<body>
  <header>
    <h1>Stunning Algorithm Workbench</h1>
    <div class="header-algo">
      <span>Algorithm</span>
      <select id="algo-select"></select>
      <button class="header-btn" id="btn-edit-algo">Edit…</button>
    </div>
  </header>

  <div class="workspace">
    <aside>
      <!-- Profile -->
      <div class="panel">
        <div class="panel-title">Profile</div>
        <label>
          <span>Setpoint (mA)</span>
          <input type="number" id="setpoint" value="500" min="0" max="5000" step="10" />
        </label>
        <label>
          <span>Nominal (mA)</span>
          <input type="number" id="nominal" value="400" min="0" max="5000" step="10" />
        </label>
        <label>
          <span>Duration (s)</span>
          <input type="number" id="duration" value="3.0" min="0.1" max="30" step="0.1" />
        </label>
      </div>

      <!-- Algorithm -->
      <div class="panel">
        <div class="panel-title">Algorithm</div>
        <label style="flex-direction:row; align-items:center; gap:6px; margin-bottom:0">
          <input type="checkbox" id="show-progress" checked style="width:auto; margin:0" />
          <span style="color:var(--text-dim); font-size:11px">Show progress line</span>
        </label>
      </div>

      <!-- Curves -->
      <div class="panel">
        <div class="panel-title">Curves</div>
        <label>
          <span>Active curve</span>
          <select id="curve-select"></select>
        </label>
        <button class="btn" id="btn-reset">Reset curve</button>
        <button class="btn" id="btn-save-curve">Save curve…</button>
        <button class="btn" id="btn-copy">Copy curve</button>
        <button class="btn" id="btn-clear">Clear all</button>
      </div>

      <!-- Results -->
      <div class="panel" style="flex:1">
        <div class="panel-title">Result</div>
        <div id="result-badge">—</div>
        <div id="zone-times"></div>
        <div id="violations"></div>
      </div>
    </aside>

    <div id="sidebar-splitter" class="splitter"></div>

    <!-- Chart -->
    <div class="chart-area">
      <div class="chart-wrap">
        <canvas id="dev-chart"></canvas>
      </div>
      <div class="chart-hint">
        Left-click: add point &nbsp;|&nbsp; Drag: move point &nbsp;|&nbsp; Right-click: delete point
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
